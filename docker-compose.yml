version: '3.8'

services:
  kinexus-app:
    build: .
    container_name: kinexus-frontend
    ports:
      - "3001:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  default:
    name: kinexus-network
    driver: bridge
